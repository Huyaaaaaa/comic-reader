services:
  backend:
    build:
      context: ..
      dockerfile: deploy/docker/backend.Dockerfile
    environment:
      HEHUAN_HTTP_ADDR: ":8080"
      HEHUAN_DATA_DIR: "/app/data"
      HEHUAN_ALLOWED_ORIGINS: ""
    volumes:
      - hehuan-data:/app/data
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  hehuan-data:
